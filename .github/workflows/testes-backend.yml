name: Testes Python Backend

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  rodar-testes:
    name: Testes da API
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências da API e Testes
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.api.txt -r requirements.test.txt

      - name: Executar testes da API com Pytest e Cobertura XML
        run: pytest --cov=app --cov-report=xml --cov-fail-under=90 tests/api tests/test_setup.py

      - name: Subir relatório de cobertura da API
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: coverage.xml

  testes-etl:
    name: Testes do ETL (Worker)
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências do ETL e Testes
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.test.txt
          grep -v "google-genai" requirements.worker.txt > temp_requirements.txt
          pip install -r temp_requirements.txt
          rm temp_requirements.txt
          pip install "google-genai==2.8.0"

      - name: Executar testes do ETL com Pytest e Cobertura XML
        run: pytest --cov=etl --cov-report=xml --cov-fail-under=90 tests/etl

      - name: Subir relatório de cobertura do ETL
        uses: actions/upload-artifact@v4
        with:
          name: coverage-etl
          path: coverage.xml

  sonarcloud:
    name: Análise SonarQube Cloud
    runs-on: ubuntu-latest
    needs: [rodar-testes, testes-etl]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar relatórios de cobertura de testes
        uses: actions/download-artifact@v4

      - name: SonarQube Cloud Scan
        # Roda apenas se houver token E se estiver no seu fork OU no repositório original
        if: ${{ env.SONAR_TOKEN != '' && (github.repository == 'henriquemendeselias/2026.1-ContraDito' || github.repository == 'unb-mds/2026.1-ContraDito') }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository == 'unb-mds/2026.1-ContraDito' && 'unb-mds_2026.1-ContraDito' || 'henriquemendeselias_2026.1-ContraDito' }}
            -Dsonar.organization=${{ github.repository == 'unb-mds/2026.1-ContraDito' && 'unb-mds' || 'contradito' }}            
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          # Força análise de branch apenas se for o fork pessoal (para evitar erro 404). 
          # Se for o original, usa o tipo de evento padrão do GitHub (para fazer análise de PR).
          GITHUB_EVENT_NAME: ${{ github.repository != 'unb-mds/2026.1-ContraDito' && 'push' || github.event_name }}