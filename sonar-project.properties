sonar.organization=contradito
sonar.projectKey=henriquemendeselias_2026.1-ContraDito
sonar.projectName=2026.1-ContraDito

# Pastas de código que serão analisadas
sonar.sources=app,etl,utils,frontend/app,frontend/components,frontend/lib

# Pastas e arquivos que devem ser ignorados (legados, venv, docs)
sonar.exclusions=**/node_modules/**, **/.venv/**, **/.venv-api/**, **/.next/**, **/tests/**, **/pocs/**, **/docs/**, frontend/lib/types-legacy.ts

# Ignorar o frontend dos requisitos de cobertura de teste, mantendo a análise de bugs e segurança
sonar.coverage.exclusions=frontend/**

# Onde estão as pastas de testes do Pytest
sonar.tests=tests

# Caminho dos relatórios de cobertura de testes baixados como artefatos (em suas respectivas subpastas)
sonar.python.coverage.reportPaths=coverage-api/coverage.xml,coverage-etl/coverage.xml
